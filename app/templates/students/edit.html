{% extends "base.html" %}

{% block title %}Edit Student - LUS RSIS Management System{% endblock %}

{% block content %}
<div class="container">
    <h2>Edit Student</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="student_id">Student ID</label>
            <input type="text" id="student_id" name="student_id" value="{{ student.student_id }}" disabled>
            <small>Student ID cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="first_name">First Name *</label>
            <input type="text" id="first_name" name="first_name" value="{{ student.first_name }}" required>
        </div>
        
        <div class="form-group">
            <label for="last_name">Last Name *</label>
            <input type="text" id="last_name" name="last_name" value="{{ student.last_name }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ student.email }}" disabled>
            <small>Email cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="{{ student.phone or '' }}">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Update Student</button>
            <a href="{{ url_for('students.view_student', student_id=student.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
