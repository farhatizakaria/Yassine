{% extends "base.html" %}

{% block title %}Edit Teacher - LUS RSIS Management System{% endblock %}

{% block content %}
<div class="container">
    <h2>Edit Teacher</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="matricule">Matricule</label>
            <input type="text" id="matricule" name="matricule" value="{{ teacher.matricule }}" disabled>
            <small>Matricule cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="first_name">First Name *</label>
            <input type="text" id="first_name" name="first_name" value="{{ teacher.first_name }}" required>
        </div>
        
        <div class="form-group">
            <label for="last_name">Last Name *</label>
            <input type="text" id="last_name" name="last_name" value="{{ teacher.last_name }}" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ teacher.email }}" disabled>
            <small>Email cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="{{ teacher.phone or '' }}">
        </div>
        
        <div class="form-group">
            <label for="office">Office</label>
            <input type="text" id="office" name="office" value="{{ teacher.office or '' }}">
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Update Teacher</button>
            <a href="{{ url_for('teachers.view_teacher', teacher_id=teacher.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
