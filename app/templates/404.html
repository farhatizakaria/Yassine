{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 3rem 2rem;">
    <h2 style="font-size: 3rem; color: #e74c3c;">404</h2>
    <p style="font-size: 1.5rem; margin: 1rem 0;">Page Not Found</p>

    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go Home</a>
</div>
{% endblock %}
