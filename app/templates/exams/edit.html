{% extends "base.html" %}

{% block title %}Edit Exam - LUS RSIS Management System{% endblock %}

{% block content %}
<div class="container">
    <h2>Edit Exam</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="exam_code">Exam Code</label>
            <input type="text" id="exam_code" name="exam_code" value="{{ exam.exam_code }}" disabled>
            <small>Exam code cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="student_id">Student</label>
            <input type="text" id="student_id" value="{{ exam.student.student_id }} - {{ exam.student.first_name }} {{ exam.student.last_name }}" disabled>
            <small>Student cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="module_id">Module</label>
            <input type="text" id="module_id" value="{{ exam.module.code }} - {{ exam.module.name }}" disabled>
            <small>Module cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="exam_date">Exam Date & Time</label>
            <input type="text" value="{{ exam.exam_date.strftime('%Y-%m-%d %H:%M') }}" disabled>
            <small>Exam date cannot be changed</small>
        </div>
        
        <div class="form-group">
            <label for="duration_minutes">Duration (minutes) *</label>
            <input type="number" id="duration_minutes" name="duration_minutes" value="{{ exam.duration_minutes }}" min="30" max="300" required>
        </div>
        
        <div class="form-group">
            <label for="room_number">Room Number *</label>
            <input type="text" id="room_number" name="room_number" value="{{ exam.room_number }}" required>
        </div>
        
        <div class="form-group">
            <label for="score">Score</label>
            <input type="number" id="score" name="score" value="{{ exam.score or '' }}" min="0" max="100" step="0.01">
        </div>
        
        <div class="form-group">
            <label for="status">Status *</label>
            <select id="status" name="status" required>
                <option value="scheduled" {% if exam.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
                <option value="completed" {% if exam.status == 'completed' %}selected{% endif %}>Completed</option>
                <option value="cancelled" {% if exam.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Update Exam</button>
            <a href="{{ url_for('exams.view_exam', exam_id=exam.id) }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
