{% extends "base.html" %}

{% block title %}Schedule Exam - LUS RSIS Management System{% endblock %}

{% block content %}
<div class="container">
    <h2>Schedule New Exam</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="exam_code">Exam Code *</label>
            <input type="text" id="exam_code" name="exam_code" placeholder="e.g., EXAM-2025-001" required>
        </div>
        
        <div class="form-group">
            <label for="student_id">Student *</label>
            <select id="student_id" name="student_id" required>
                <option value="">Select student</option>
                {% for student in students %}
                <option value="{{ student.id }}">{{ student.student_id }} - {{ student.first_name }} {{ student.last_name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="module_id">Module *</label>
            <select id="module_id" name="module_id" required>
                <option value="">Select module</option>
                {% for module in modules %}
                <option value="{{ module.id }}">{{ module.code }} - {{ module.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="exam_date">Exam Date & Time *</label>
            <input type="datetime-local" id="exam_date" name="exam_date" required>
        </div>
        
        <div class="form-group">
            <label for="duration_minutes">Duration (minutes) *</label>
            <input type="number" id="duration_minutes" name="duration_minutes" value="120" min="30" max="300" required>
        </div>
        
        <div class="form-group">
            <label for="room_number">Room Number *</label>
            <input type="text" id="room_number" name="room_number" placeholder="e.g., A101" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-success">Schedule Exam</button>
            <a href="{{ url_for('exams.list_exams') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
